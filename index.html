<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>景點城市清單</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }
    .desc {
      color: #4b5563;
      line-height: 1.7;
      margin-bottom: 18px;
    }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(245, 247, 251, 0.96);
      backdrop-filter: blur(8px);
      padding: 12px 0 16px;
    }
    .search {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
      outline: none;
    }
    .search:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }
    .meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 10px;
      color: #6b7280;
      font-size: 14px;
    }
    .city-block {
      margin: 16px 0;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .city-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
      border-bottom: 1px solid #f1f5f9;
      gap: 12px;
      background: #fff;
    }
    .city-name {
      font-size: 20px;
      font-weight: 700;
    }
    .city-count {
      color: #6b7280;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }
    .spot-list {
      margin: 0;
      padding: 14px 18px 18px 38px;
      columns: 1;
    }
    .spot-item {
      line-height: 1.9;
      margin: 2px 0;
      break-inside: avoid;
    }
    .hidden {
      display: none !important;
    }
    .empty {
      margin-top: 18px;
      padding: 28px;
      text-align: center;
      border: 1px dashed #cbd5e1;
      border-radius: 14px;
      background: #fff;
      color: #6b7280;
    }
    @media (min-width: 900px) {
      .spot-list {
        columns: 2;
        column-gap: 36px;
      }
    }
  </style>
</head>

    const listEl = document.getElementById("list");
    const searchInput = document.getElementById("searchInput");
    const cityCountEl = document.getElementById("cityCount");
    const spotCountEl = document.getElementById("spotCount");
    const visibleCityCountEl = document.getElementById("visibleCityCount");
    const visibleSpotCountEl = document.getElementById("visibleSpotCount");
    const emptyStateEl = document.getElementById("emptyState");

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function render(data) {
      const cities = Object.keys(data).sort((a, b) => a.localeCompare(b, "zh-Hant"));
      const totalSpots = cities.reduce((sum, city) => sum + data[city].length, 0);

      cityCountEl.textContent = cities.length;
      spotCountEl.textContent = totalSpots;
      visibleCityCountEl.textContent = cities.length;
      visibleSpotCountEl.textContent = totalSpots;

      listEl.innerHTML = cities.map(city => {
        const spots = data[city];
        const items = spots.map(spot => `
          <li class="spot-item"
              data-city="${escapeHtml(city.toLowerCase())}"
              data-spot="${escapeHtml(spot.toLowerCase())}">
            ${escapeHtml(spot)}
          </li>
        `).join("");

        return `
          <section class="city-block" data-city-block="${escapeHtml(city.toLowerCase())}">
            <div class="city-head">
              <div class="city-name">${escapeHtml(city)}</div>
              <div class="city-count"><span class="city-visible-count">${spots.length}</span> / ${spots.length} 個景點</div>
            </div>
            <ul class="spot-list">${items}</ul>
          </section>
        `;
      }).join("");
    }

    function filterData() {



	const keyword = searchInput.value;
      const blocks = document.querySelectorAll("[data-city-block]");
      let visibleCities = 0;
      let visibleSpots = 0;

      blocks.forEach(block => {
        const items = block.querySelectorAll(".spot-item");
        let cityVisibleSpots = 0;

        items.forEach(item => {
          const city = item.dataset.city;
          const spot = item.dataset.spot;


		const matched = !keyword || city.includes(keyword) || spot.includes(keyword);
          item.classList.toggle("hidden", !matched);
          if (matched) {
            cityVisibleSpots++;
            visibleSpots++;
          }
        });

        block.classList.toggle("hidden", cityVisibleSpots === 0);

        const countEl = block.querySelector(".city-visible-count");
        countEl.textContent = cityVisibleSpots;

        if (cityVisibleSpots > 0) visibleCities++;
      });

      visibleCityCountEl.textContent = visibleCities;
      visibleSpotCountEl.textContent = visibleSpots;
      emptyStateEl.classList.toggle("hidden", visibleCities !== 0);
    }

    render(DATA);
    searchInput.addEventListener("input", filterData);
  </script>
